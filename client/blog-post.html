<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Post | AIC Ziwani</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">

<script>
  (function() {
    const { protocol, hostname, port, pathname, search, hash } = window.location;
    const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

    if (protocol.startsWith("http") && isLocalHost && port && port !== "3000") {
      window.location.replace(`${protocol}//${hostname}:3000${pathname}${search}${hash}`);
    }
  })();
</script>

<script>
  (function() {
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
:root {
  --primary-red: #c8102e;
  --dark-red: #9e0d23;
  --bg-primary: #f4f4f4;
  --bg-secondary: white;
  --bg-secondary-translucent: rgba(255, 255, 255, 0.96);
  --text-primary: #222;
  --text-secondary: gray;
  --text-on-primary: white;
  --border-color: #eee;
  --shadow-color-light: rgba(0,0,0,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.06);
  --button-bg: #f0f0f0;
  --button-border: #ddd;
  --button-hover-bg: #e0e0e0;
}

[data-theme="dark"] {
  --primary-red: #e53935;
  --dark-red: #c8102e;
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --bg-secondary-translucent: rgba(30, 30, 30, 0.96);
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border-color: #333;
  --shadow-color-light: rgba(255,255,255,0.05);
  --shadow-color-heavy: rgba(255,255,255,0.1);
  --button-bg: #2a2a2a;
  --button-border: #444;
  --button-hover-bg: #3a3a3a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* NAVBAR */
nav {
  background: var(--bg-secondary-translucent);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px var(--shadow-color-light);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.logo-area img {
  width: 56px;
}

.church-name h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.church-name span {
  font-size: 12px;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  display: block;
}

.nav-links {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  margin-left: auto;
}

.nav-links a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  line-height: 1;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  color: var(--text-primary);
}

.nav-links a:hover {
  background: var(--primary-red);
  color: var(--text-on-primary);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

.nav-links a.active {
  background: var(--primary-red);
  color: var(--text-on-primary);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

/* BLOG POST SECTION */
.blog-post-section {
  padding: 40px;
  background: var(--bg-secondary);
  border-radius: 18px;
  box-shadow: 0 12px 30px var(--shadow-color-heavy);
}

.blog-post-shell {
  max-width: 800px;
  margin: 80px auto;
  position: relative;
}

.close-post-button {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--button-border);
  border-radius: 999px;
  background: var(--bg-secondary-translucent);
  color: var(--text-primary);
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 24px var(--shadow-color-light);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  z-index: 2;
}

.close-post-button:hover {
  background: var(--button-hover-bg);
  transform: translateY(-1px);
  box-shadow: 0 14px 28px var(--shadow-color-heavy);
}

.blog-post-section h1 {
  font-size: 36px;
  margin-bottom: 15px;
}

.blog-post-section .meta {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 30px;
}

.blog-post-section .content {
  line-height: 1.7;
  font-size: 16px;
  white-space: pre-wrap; /* To respect newlines from textarea */
}

/* POST ACTIONS (LIKES) */
.post-actions {
  margin-top: 40px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-top: 1px solid var(--border-color);
  padding-top: 20px;
}

#likeButton {
  background: var(--button-bg);
  border: 1px solid var(--button-border);
  padding: 10px 20px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
}

#likeButton:hover {
  background: var(--button-hover-bg);
  transform: translateY(-1px);
}

#likeButton:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

#likeCount {
  font-weight: 600;
  color: var(--text-secondary);
}

/* COMMENTS SECTION */
.comments-section {
  margin-top: 40px;
  border-top: 1px solid var(--border-color);
  padding-top: 30px;
}

.comments-section h3 {
  margin-bottom: 20px;
}

#commentForm {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 30px;
}

#commentForm input,
#commentForm textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 16px;
  background: var(--bg-primary);
  color: var(--text-primary);
}

#commentForm textarea {
  min-height: 100px;
  resize: vertical;
}

#commentForm button {
  align-self: flex-start;
  background: var(--primary-red);
  color: var(--text-on-primary);
  border: none;
  padding: 12px 25px;
  border-radius: 999px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}

#commentForm button:hover {
  background: var(--dark-red);
}

.comment {
  background: var(--bg-primary);
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid var(--border-color);
}

.comment-author {
  font-weight: bold;
  margin-bottom: 5px;
}

.comment-date {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: 8px;
}

.comment-content {
  line-height: 1.6;
}

/* FOOTER */
footer {
  background: #1e1e1e;
  color: var(--text-on-primary);
  padding: 30px;
  text-align: center;
  margin-top: 80px;
}

@media (max-width: 640px) {
  nav {
    padding: 12px 14px;
    gap: 14px;
    align-items: flex-start;
  }

  .logo-area {
    width: 100%;
  }

  .logo-area img {
    width: 46px;
  }

  .church-name h1 {
    font-size: 17px;
  }

  .church-name span {
    font-size: 11px;
  }

  .nav-links {
    width: 100%;
    margin-left: 0;
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a {
    flex: 0 0 auto;
    white-space: nowrap;
    padding: 10px 14px;
  }

  .blog-post-section {
    margin: 0;
    padding: 24px 18px;
    border-radius: 16px;
  }

  .blog-post-shell {
    margin: 32px 16px;
  }

  .close-post-button {
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    font-size: 24px;
  }

  .blog-post-section h1 {
    font-size: 28px;
    line-height: 1.15;
  }

  .post-actions {
    flex-direction: column;
    align-items: flex-start;
  }

  #likeButton,
  #commentForm button {
    width: 100%;
  }

  #commentForm button {
    align-self: stretch;
  }

  footer {
    margin-top: 48px;
    padding: 24px 16px;
  }

}

</style>
</head>

<body>

<nav>
  <div class="logo-area">
    <img src="favicon.png" alt="AIC Ziwani logo">
    <div class="church-name">
      <h1>AIC Ziwani CYA</h1>
      <span>Africa Inland Church</span>
    </div>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="fellowship.html">Fellowship</a>
    <a href="events.html">Events</a>
    <a href="gallery.html">Gallery</a>
    <a href="blog.html" class="active">Blog</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<main class="blog-post-shell">
  <button
    type="button"
    class="close-post-button"
    aria-label="Close blog post"
    title="Close"
    onclick="closeBlogPost()"
  >&times;</button>

  <section id="blogPostContainer" class="blog-post-section">
    <!-- Dynamic content will be loaded here -->
    <h1>Loading post...</h1>
  </section>
</main>

<footer>
  © 2026 AIC Ziwani | Africa Inland Church. All Rights Reserved.
</footer>

<script>
const LOCAL_BACKEND_ORIGIN = "http://localhost:3000";
let currentUser = null;

function getBackendOrigin() {
  const { protocol, hostname, port, origin } = window.location;
  const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

  if (protocol.startsWith("http") && (!isLocalHost || port === "3000")) {
    return origin;
  }

  return LOCAL_BACKEND_ORIGIN;
}

const backendOrigin = getBackendOrigin();

function buildBackendUrl(path) {
  return new URL(path, backendOrigin).toString();
}

async function loadAuthState() {
  try {
    const response = await fetch(buildBackendUrl("/api/auth/user"), {
      credentials: "include"
    });

    if (!response.ok) {
      return null;
    }

    const user = await response.json();
    return (user && user.displayName) ? user : null;
  } catch (error) {
    console.error("Could not load auth state:", error);
    return null;
  }
}

function closeBlogPost() {
  try {
    if (document.referrer) {
      const previousUrl = new URL(document.referrer);
      if (previousUrl.origin === window.location.origin) {
        window.history.back();
        return;
      }
    }
  } catch (error) {
    console.warn("Could not resolve previous page for blog close button:", error);
  }

  window.location.href = "blog.html";
}

async function loadBlogPost() {
  const container = document.getElementById("blogPostContainer");
  try {
    const params = new URLSearchParams(window.location.search);
    const blogId = params.get('id');

    if (!blogId) {
      container.innerHTML = "<h1>Blog post not found.</h1><p>No ID was provided.</p>";
      return;
    }

    const response = await fetch(buildBackendUrl(`/api/blogs/${blogId}`), {
      credentials: 'include',
    });
    if (!response.ok) {
      let errorMessage = `HTTP error! Status: ${response.status}`;
      try {
        const errorData = await response.json();
        if (errorData && errorData.error) {
          errorMessage = errorData.error; // Use the specific error message from the server
        }
      } catch (jsonError) {
        console.warn("Server error response was not JSON:", jsonError);
      }
      throw new Error(errorMessage);
    }
    const blog = await response.json();

    document.title = `${blog.title} | AIC Ziwani Blog`;

    const createdAt = new Date(blog.created_at).toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    container.innerHTML = `
      <h1>${blog.title}</h1>
      <div class="meta">By Admin | ${createdAt}</div>
      <div class="content">${blog.content}</div>      
      <div class="post-actions">
        <button id="likeButton" title="Like this post">❤️ Like</button>
        <span id="likeCount">${blog.likes} likes</span>
      </div>
      <div class="comments-section">
        <h3><span id="commentCount">${blog.comments.length}</span> Comments</h3>
        <form id="commentForm">
          <input type="text" id="authorName" placeholder="Your Name" required>
          <textarea id="commentContent" placeholder="Write a comment..." required></textarea>
          <button type="submit">Post Comment</button>
        </form>
        <div id="commentsList">
          <!-- Comments will be loaded here -->
        </div>
      </div>
    `;

    renderComments(blog.comments);

    const likeButton = document.getElementById('likeButton');
    const commentForm = document.getElementById('commentForm');
    const authorNameInput = document.getElementById('authorName');

    if (!currentUser) {
      likeButton.disabled = true;
      likeButton.textContent = 'Login to like';

      if (commentForm) {
        const loginPrompt = document.createElement('p');
        loginPrompt.textContent = 'Please log in from the home page to like this post or leave a comment.';
        commentForm.replaceWith(loginPrompt);
      }
    } else {
      if (authorNameInput) {
        authorNameInput.value = currentUser.displayName || '';
        authorNameInput.readOnly = true;
      }

      if (blog.userHasLiked) {
        likeButton.disabled = true;
        likeButton.textContent = 'Liked!';
      } else {
        likeButton.addEventListener('click', () => handleLike(blog.id));
      }

      if (commentForm) {
        commentForm.addEventListener('submit', (e) => handleCommentSubmit(e, blog.id));
      }
    }

  } catch (error) {
    console.error("Error loading blog post:", error);
    container.innerHTML = `<h1>Error</h1><p>${error.message || "Could not load the blog post. It may have been deleted or the link is incorrect."}</p>`;
  }
}

function renderComments(comments) {
  const commentsList = document.getElementById('commentsList');
  commentsList.innerHTML = '';

  if (comments.length === 0) {
    commentsList.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
    return;
  }

  comments.forEach(comment => {
    const commentDate = new Date(comment.created_at).toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    const commentEl = document.createElement('div');
    commentEl.className = 'comment';
    commentEl.innerHTML = `
      <p class="comment-author">
        ${comment.author_name}
        <span class="comment-date">${commentDate}</span>
      </p>
      <p class="comment-content">${comment.content}</p>
    `;
    commentsList.appendChild(commentEl);
  });
}

async function handleLike(blogId) {
  const likeButton = document.getElementById('likeButton');
  const likeCountSpan = document.getElementById('likeCount');
  likeButton.disabled = true;

  try {
    const response = await fetch(buildBackendUrl(`/api/blogs/${blogId}/like`), {
      method: 'POST',
      credentials: 'include',
    });

    const result = await response.json();

    if (!response.ok) {
      if (response.status === 409) {
        likeButton.textContent = 'Liked!';
        if (typeof result.likes === 'number') {
          likeCountSpan.textContent = `${result.likes} likes`;
        }
        return;
      }
      throw new Error(result.error || 'Failed to like post.');
    }

    likeCountSpan.textContent = `${result.likes} likes`;
    likeButton.textContent = 'Liked!';
  } catch (error) {
    alert(error.message);
    likeButton.disabled = false;
  }
}

async function handleCommentSubmit(event, blogId) {
  event.preventDefault();
  const form = event.target;
  const content = document.getElementById('commentContent').value;
  const submitButton = form.querySelector('button');

  submitButton.disabled = true;
  submitButton.textContent = 'Posting...';

  try {
    const response = await fetch(buildBackendUrl(`/api/blogs/${blogId}/comments`), {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });

    const newComment = await response.json();

    if (!response.ok) {
      throw new Error(newComment.error || 'Failed to post comment.');
    }

    const commentsList = document.getElementById('commentsList');
    const commentCountSpan = document.getElementById('commentCount');
    
    if (commentsList.querySelector('p')) {
        commentsList.innerHTML = '';
    }

    const commentDate = new Date(newComment.created_at).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const commentEl = document.createElement('div');
    commentEl.className = 'comment';
    commentEl.innerHTML = `<p class="comment-author">${newComment.author_name}<span class="comment-date">${commentDate}</span></p><p class="comment-content">${newComment.content}</p>`;
    commentsList.prepend(commentEl);

    commentCountSpan.textContent = parseInt(commentCountSpan.textContent, 10) + 1;
    form.reset();
  } catch (error) {
    alert(error.message);
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = 'Post Comment';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = await loadAuthState();
  await loadBlogPost();
});
</script>

</body>
</html>
