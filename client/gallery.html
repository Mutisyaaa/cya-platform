<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | AIC Ziwani</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">

<script src="runtime-config.js"></script>
<script src="backend-origin.js"></script>
<script>
  (function() {
    const { protocol, hostname, port, pathname, search, hash } = window.location;
    const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

    if (protocol.startsWith("http") && isLocalHost && port && port !== "3000") {
      window.location.replace(`${protocol}//${hostname}:3000${pathname}${search}${hash}`);
    }
  })();
</script>

<script>
  (function() {
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
:root {
  --primary-red: #c8102e;
  --dark-red: #9e0d23;
  --bg-primary: #f4f4f4;
  --bg-secondary: white;
  --bg-secondary-translucent: rgba(255, 255, 255, 0.96);
  --text-primary: #222;
  --text-secondary: gray;
  --text-on-primary: white;
  --border-color: #ddd;
  --shadow-color-light: rgba(0,0,0,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.08);
  --shadow-color-hover: rgba(0,0,0,0.12);
  --button-bg: #f0f0f0;
  --button-border: #ddd;
  --button-hover-bg: #e0e0e0;
}


[data-theme="dark"] {
  --primary-red: #e53935;
  --dark-red: #c8102e;
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --bg-secondary-translucent: rgba(30, 30, 30, 0.96);
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border-color: #333;
  --shadow-color-light: rgba(255,255,255,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.2);
  --shadow-color-hover: rgba(0,0,0,0.3);
  --button-bg: #2a2a2a;
  --button-border: #444;
  --button-hover-bg: #3a3a3a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* NAVBAR */
nav {
  background: var(--bg-secondary-translucent);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px var(--shadow-color-light);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.logo-area img {
  width: 56px;
}

.church-name h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.church-name span {
  font-size: 12px;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  display: block;
}

.nav-links {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  margin-left: auto;
}

.nav-links a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  line-height: 1;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  color: var(--text-primary);
}

.nav-links a:hover {
  background: var(--primary-red);
  color: var(--text-on-primary);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

.nav-links a.active {
  background: var(--primary-red);
  color: var(--text-on-primary);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

@media (max-width: 900px) {
  nav {
    padding: 14px 20px;
  }

  .church-name h1 {
    font-size: 18px;
  }

  .nav-links {
    width: 100%;
    justify-content: center;
  }
}

/* HEADER */
.page-header {
  background:
    linear-gradient(180deg, rgba(200,16,46,0.06), rgba(200,16,46,0)),
    var(--bg-secondary);
  color: var(--text-primary);
  padding: 72px 20px 56px;
  text-align: center;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}

.page-header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(180px, 42vw);
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, #c8102e, #9e0d23);
}

.page-header h2 {
  font-size: 42px;
  color: var(--primary-red);
}

.page-header p {
  margin-top: 15px;
  font-size: 18px;
  color: var(--text-secondary);
}

/* GALLERY SECTION */
.gallery-section {
  padding: 100px 60px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 12px 30px var(--shadow-color-heavy);
  cursor: pointer;
  transition: 0.3s ease;
}

.gallery-item img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  transition: 0.4s ease;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

.gallery-title {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  width: 100%;
  padding: 10px;
  font-size: 14px;
  text-align: center;
}

/* MODAL STYLES */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal-content {
  background: var(--bg-secondary);
  border-radius: 18px;
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--button-border);
  border-radius: 999px;
  background: var(--bg-secondary-translucent);
  color: var(--text-primary);
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 24px var(--shadow-color-light);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.modal-close:hover {
  background: var(--button-hover-bg);
  transform: translateY(-1px);
  box-shadow: 0 14px 28px var(--shadow-color-heavy);
}

#modalBody {
  padding: 30px;
  overflow-y: auto;
}

#modalBody .media-container {
  text-align: center;
  margin-bottom: 20px;
}

#modalBody img, #modalBody video {
  max-width: 100%;
  max-height: 60vh;
  border-radius: 12px;
}

#modalBody h3 {
  font-size: 24px;
  margin-bottom: 20px;
}

.post-actions {
  margin-top: 20px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  border-top: 1px solid var(--border-color);
  padding-top: 20px;
}

.action-button {
  border: 1px solid var(--button-border);
  background: var(--button-bg);
  color: var(--text-primary);
  min-width: 52px;
  height: 52px;
  padding: 0 16px;
  border-radius: 999px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
}

.action-button:hover {
  background: var(--button-hover-bg);
  transform: translateY(-1px);
}

.action-button:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

.action-button.is-active {
  background: rgba(200, 16, 46, 0.12);
  border-color: rgba(200, 16, 46, 0.36);
  color: var(--primary-red);
}

.action-icon {
  width: 21px;
  height: 21px;
  display: inline-flex;
}

.action-icon svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.action-button.is-active .action-icon svg.fill-on-active {
  fill: currentColor;
}

.action-count {
  font-weight: 700;
  font-size: 14px;
  color: inherit;
}

.comments-section {
  margin-top: 30px;
  border-top: 1px solid var(--border-color);
  padding-top: 20px;
}

.comments-section h4 {
  margin-bottom: 20px;
}

#commentForm {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 30px;
}

#commentForm input,
#commentForm textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 16px;
  background: var(--bg-primary);
  color: var(--text-primary);
}

#commentForm textarea {
  min-height: 80px;
  resize: vertical;
}

#commentForm button {
  align-self: flex-start;
  background: var(--primary-red);
  color: var(--text-on-primary);
  border: none;
  padding: 12px 25px;
  border-radius: 999px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}

#commentForm button:hover {
  background: var(--dark-red);
}

.comment {
  background: var(--bg-primary);
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid var(--border-color);
}

.comment-author {
  font-weight: bold;
  margin-bottom: 5px;
}

.comment-date {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: 8px;
}

.comment-content {
  line-height: 1.6;
}

.comment.is-reply {
  margin-top: 12px;
  margin-bottom: 0;
}

.comment-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.comment-meta {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
}

.comment-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.comment-like-btn,
.reply-toggle-btn,
.reply-collapse-btn,
.reply-cancel-btn {
  border: none;
  background: transparent;
  color: var(--primary-red);
  cursor: pointer;
  font-weight: 700;
  padding: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.comment-like-btn {
  color: var(--text-secondary);
}

.comment-like-btn.is-active {
  color: var(--primary-red);
}

.comment-like-btn:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

.comment-like-btn .action-icon {
  width: 16px;
  height: 16px;
}

.comment-like-count {
  font-size: 13px;
  color: inherit;
}

.reply-toggle-btn:hover,
.reply-collapse-btn:hover,
.reply-cancel-btn:hover {
  color: var(--dark-red);
}

.comment-children {
  margin-top: 12px;
  padding-left: 18px;
  border-left: 2px solid var(--border-color);
  display: grid;
  gap: 12px;
}

.reply-form {
  margin-top: 12px;
  display: grid;
  gap: 10px;
}

.reply-form textarea {
  width: 100%;
  min-height: 88px;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  font-size: 15px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  resize: vertical;
}

.reply-form-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.reply-submit-btn {
  border: none;
  background: var(--primary-red);
  color: var(--text-on-primary);
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 700;
  cursor: pointer;
}

.reply-submit-btn:hover {
  background: var(--dark-red);
}

/* FOOTER */
footer {
  background: #1e1e1e;
  color: var(--text-on-primary);
  padding: 30px;
  text-align: center;
  margin-top: 80px;
}

@media (max-width: 640px) {
  nav {
    padding: 12px 14px;
    gap: 14px;
    align-items: flex-start;
  }

  .logo-area {
    width: 100%;
  }

  .logo-area img {
    width: 46px;
  }

  .church-name h1 {
    font-size: 17px;
  }

  .church-name span {
    font-size: 11px;
  }

  .nav-links {
    width: 100%;
    margin-left: 0;
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;

  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a {
    flex: 0 0 auto;
    white-space: nowrap;
    padding: 10px 14px;
  }

  .page-header {
    padding: 56px 16px;
  }

  .page-header h2 {
    font-size: 32px;
  }

  .page-header p {
    font-size: 16px;
  }

  .gallery-section {
    padding: 56px 16px;
  }

  .gallery-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .gallery-item img {
    height: 170px;
  }

  .gallery-title {
    padding: 8px;
    font-size: 12px;
  }

  .modal-overlay {
    padding: 12px;
  }

  .modal-content {
    max-height: calc(100vh - 24px);
    border-radius: 16px;
  }

  .modal-close {
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    font-size: 24px;
  }

  #modalBody {
    padding: 18px 16px 22px;
  }

  .post-actions {
    justify-content: flex-start;
    align-items: center;
  }

  .action-button {
    width: auto;
    min-width: 44px;
    height: 44px;
    padding: 0 12px;
    gap: 6px;
  }

  .action-icon {
    width: 18px;
    height: 18px;
  }

  .action-count {
    font-size: 13px;
  }

  #commentForm button {
    width: 100%;
    align-self: stretch;
  }

  .comment-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .comment-children {
    padding-left: 14px;
  }

  footer {
    margin-top: 48px;
    padding: 24px 16px;
  }

}

@media (max-width: 420px) {
  .gallery-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<script>
const LOCAL_BACKEND_ORIGIN = "http://localhost:3000";

function getBackendOrigin() {
  if (window.CYABackendOrigin?.resolveBackendOrigin) {
    return window.CYABackendOrigin.resolveBackendOrigin({ localFallback: LOCAL_BACKEND_ORIGIN });
  }

  const { protocol, hostname, port, origin } = window.location;
  const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";
  if (protocol.startsWith("http") && (!isLocalHost || port === "3000")) {
    return origin;
  }

  return LOCAL_BACKEND_ORIGIN;
}

const backendOrigin = getBackendOrigin();

function buildBackendUrl(path) {
  if (window.CYABackendOrigin?.buildBackendUrl) {
    return window.CYABackendOrigin.buildBackendUrl(path, backendOrigin);
  }

  return new URL(path, backendOrigin).toString();
}

let currentUser = null;

async function loadAuthState() {
  try {
    const response = await fetch(buildBackendUrl("/api/auth/user"), {
      credentials: "include"
    });

    if (!response.ok) {
      return null;
    }

    const user = await response.json();
    return (user && user.displayName) ? user : null;
  } catch (error) {
    console.error("Could not load auth state:", error);
    return null;
  }
}

async function loadGallery() {
  try {
    const response = await fetch(buildBackendUrl("/api/gallery"));
    const images = await response.json();

    const container = document.getElementById("galleryContainer");
    container.innerHTML = "";

    images.forEach(item => {
      const fileUrl = buildBackendUrl(item.image_url);
      const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
      
      let mediaMarkup = "";
      if (isVideo) {
        mediaMarkup = `<video src="${fileUrl}" style="width: 100%; height: 280px; object-fit: cover; pointer-events: none;"></video>`;
      } else {
        mediaMarkup = `<img src="${fileUrl}" alt="${item.title}">`;
      }

      const card = `
        <div class="gallery-item" data-id="${item.id}">
          ${mediaMarkup}
          <div class="gallery-title">${item.title}</div>
        </div>
      `;
      container.innerHTML += card;
    });

    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => openGalleryModal(item.dataset.id));
    });

  } catch (error) {
    console.error("Error loading gallery:", error);
  }
}

const modal = document.getElementById('galleryModal');
const modalBody = document.getElementById('modalBody');
const modalClose = document.querySelector('.modal-close');

modalClose.addEventListener('click', closeGalleryModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    closeGalleryModal();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('open')) {
    closeGalleryModal();
  }
});

function closeGalleryModal() {
  modal.classList.remove('open');
  modalBody.innerHTML = '';
  const currentUrl = new URL(window.location.href);
  if (currentUrl.searchParams.has('item')) {
    currentUrl.searchParams.delete('item');
    window.history.replaceState({}, '', `${currentUrl.pathname}${currentUrl.search}${currentUrl.hash}`);
  }
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getHeartIconMarkup() {
  return `
    <svg class="fill-on-active" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 20s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 10c0 5.65-7 10-7 10Z"></path>
    </svg>
  `;
}

function getBookmarkIconMarkup() {
  return `
    <svg class="fill-on-active" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M7 4h10a1 1 0 0 1 1 1v15l-6-3-6 3V5a1 1 0 0 1 1-1Z"></path>
    </svg>
  `;
}

function getActionButtonsMarkup(likeCount) {
  return `
    <button id="likeButton" class="action-button" type="button" title="Like this item" aria-label="Like this item">
      <span class="action-icon">${getHeartIconMarkup()}</span>
      <span id="likeCount" class="action-count">${likeCount}</span>
    </button>
    <button id="saveButton" class="action-button" type="button" title="Save this item" aria-label="Save this item">
      <span class="action-icon">${getBookmarkIconMarkup()}</span>
    </button>
  `;
}

async function openGalleryModal(itemId) {
  modalBody.innerHTML = '<h3>Loading...</h3>';
  modal.classList.add('open');

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}`), {
      credentials: 'include'
    });
    if (!response.ok) throw new Error('Failed to load gallery item.');
    const item = await response.json();

    const fileUrl = buildBackendUrl(item.image_url);
    const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
    const mediaMarkup = isVideo
      ? `<video src="${fileUrl}" controls></video>`
      : `<img src="${fileUrl}" alt="${item.title}">`;

    modalBody.innerHTML = `
      <div class="media-container">${mediaMarkup}</div>
      <h3>${escapeHtml(item.title)}</h3>
      <div class="post-actions">
        ${getActionButtonsMarkup(item.likes)}
      </div>
      <div class="comments-section">
        <h4><span id="commentCount">${item.comments.length}</span> Comments</h4>
        <form id="commentForm">
          <input type="text" id="authorName" placeholder="Your Name" required>
          <textarea id="commentContent" placeholder="Write a comment..." required></textarea>
          <button type="submit">Post Comment</button>
        </form>
        <div id="commentsList"></div>
      </div>
    `;

    renderGalleryComments(item.comments, item.id);

    const saveButton = document.getElementById('saveButton');
    const likeButton = document.getElementById('likeButton');
    const commentForm = document.getElementById('commentForm');
    const authorNameInput = document.getElementById('authorName');
    const nextUrl = new URL(window.location.href);
    nextUrl.searchParams.set('item', String(item.id));
    window.history.replaceState({}, '', `${nextUrl.pathname}${nextUrl.search}${nextUrl.hash}`);

    if (!currentUser) {
      saveButton.disabled = true;
      likeButton.disabled = true;
      saveButton.title = 'Login to save';
      likeButton.title = 'Login to like';

      if (commentForm) {
        const loginPrompt = document.createElement('p');
        loginPrompt.textContent = 'Please log in from the home page to save, like, or comment on this item.';
        commentForm.replaceWith(loginPrompt);
      }
    } else {
      if (authorNameInput) {
        authorNameInput.value = currentUser.displayName || '';
        authorNameInput.readOnly = true;
      }

      setGallerySaveButtonState(saveButton, item.userHasSaved);
      saveButton.addEventListener('click', () => handleGallerySaveToggle(item.id));
      setGalleryLikeButtonState(likeButton, item.userHasLiked, item.likes);
      likeButton.addEventListener('click', () => handleGalleryLikeToggle(item.id));

      if (commentForm) {
        commentForm.addEventListener('submit', (e) => handleGalleryCommentSubmit(e, item.id));
      }
    }

  } catch (error) {
    modalBody.innerHTML = `<p style="color: red;">${error.message}</p>`;
  }
}

function setGallerySaveButtonState(button, isSaved) {
  if (!button) return;
  button.dataset.saved = isSaved ? 'true' : 'false';
  button.classList.toggle('is-active', isSaved);
  button.title = isSaved ? 'Remove saved item' : 'Save this item';
  button.setAttribute('aria-label', button.title);
}

function setGalleryLikeButtonState(button, isLiked, likeCount) {
  if (!button) return;
  button.dataset.liked = isLiked ? 'true' : 'false';
  button.classList.toggle('is-active', isLiked);
  button.title = isLiked ? 'Unlike this item' : 'Like this item';
  button.setAttribute('aria-label', button.title);

  const count = button.querySelector('#likeCount');
  if (count) {
    count.textContent = String(likeCount);
  }
}

function buildCommentGroups(comments) {
  const groups = new Map();

  comments.forEach((comment) => {
    const key = comment.parent_comment_id ?? 0;
    if (!groups.has(key)) {
      groups.set(key, []);
    }
    groups.get(key).push(comment);
  });

  return groups;
}

function createGalleryReplyForm(itemId, parentCommentId) {
  const form = document.createElement('form');
  form.className = 'reply-form';
  form.innerHTML = `
    <textarea placeholder="Write a reply..." required></textarea>
    <div class="reply-form-actions">
      <button class="reply-submit-btn" type="submit">Reply</button>
      <button class="reply-cancel-btn" type="button">Cancel</button>
    </div>
  `;

  form.addEventListener('submit', (event) => handleGalleryCommentSubmit(event, itemId, parentCommentId));
  form.querySelector('.reply-cancel-btn').addEventListener('click', () => {
    form.remove();
  });

  return form;
}

function setGalleryCommentLikeButtonState(button, isLiked, likeCount) {
  if (!button) return;
  button.dataset.liked = isLiked ? 'true' : 'false';
  button.classList.toggle('is-active', isLiked);
  button.title = isLiked ? 'Unlike comment' : 'Like comment';
  button.setAttribute('aria-label', button.title);

  const count = button.querySelector('.comment-like-count');
  if (count) {
    count.textContent = String(likeCount);
  }
}

async function handleGalleryCommentLikeToggle(commentId, button) {
  if (!button) return;

  const isLiked = button.dataset.liked === 'true';
  button.disabled = true;

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery-comments/${commentId}/like`), {
      method: isLiked ? 'DELETE' : 'POST',
      credentials: 'include'
    });
    const result = await response.json().catch(() => ({}));

    if (!response.ok) {
      throw new Error(result.error || 'Failed to like comment.');
    }

    setGalleryCommentLikeButtonState(button, Boolean(result.liked), typeof result.likes === 'number' ? result.likes : 0);
  } catch (error) {
    alert(error.message);
  } finally {
    button.disabled = !currentUser;
  }
}

function createGalleryCommentElement(comment, commentGroups, itemId, depth = 0) {
  const commentDate = new Date(comment.created_at).toLocaleString('en-US', {
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
  const commentEl = document.createElement('article');
  commentEl.className = `comment${depth ? ' is-reply' : ''}`;

  const header = document.createElement('div');
  header.className = 'comment-header';
  header.innerHTML = `
    <div class="comment-meta">
      <span class="comment-author">${escapeHtml(comment.author_name)}</span>
      <span class="comment-date">${escapeHtml(commentDate)}</span>
    </div>
  `;

  const body = document.createElement('p');
  body.className = 'comment-content';
  body.textContent = comment.content;

  commentEl.appendChild(header);
  commentEl.appendChild(body);

  const toolbar = document.createElement('div');
  toolbar.className = 'comment-toolbar';

  const likeButton = document.createElement('button');
  likeButton.type = 'button';
  likeButton.className = 'comment-like-btn';
  likeButton.innerHTML = `
    <span class="action-icon">${getHeartIconMarkup()}</span>
    <span class="comment-like-count">${comment.likes || 0}</span>
  `;
  setGalleryCommentLikeButtonState(likeButton, comment.userHasLiked, comment.likes || 0);
  likeButton.disabled = !currentUser;
  if (!currentUser) {
    likeButton.title = 'Login to like comments';
    likeButton.setAttribute('aria-label', likeButton.title);
  }
  likeButton.addEventListener('click', () => handleGalleryCommentLikeToggle(comment.id, likeButton));
  toolbar.appendChild(likeButton);

  if (currentUser) {
    const replyButton = document.createElement('button');
    replyButton.type = 'button';
    replyButton.className = 'reply-toggle-btn';
    replyButton.textContent = 'Reply';
    replyButton.addEventListener('click', () => {
      const existingForm = commentEl.querySelector('.reply-form');
      if (existingForm) {
        existingForm.remove();
        return;
      }

      toolbar.after(createGalleryReplyForm(itemId, comment.id));
    });

    toolbar.appendChild(replyButton);
  }

  commentEl.appendChild(toolbar);

  const childComments = commentGroups.get(comment.id) || [];
  if (childComments.length) {
    const childrenHost = document.createElement('div');
    childrenHost.className = 'comment-children';
    const visibleChildren = childComments.slice(0, 2);
    const hiddenChildren = childComments.slice(2);

    visibleChildren.forEach((child) => {
      childrenHost.appendChild(createGalleryCommentElement(child, commentGroups, itemId, depth + 1));
    });

    if (hiddenChildren.length) {
      const hiddenRepliesHost = document.createElement('div');
      hiddenRepliesHost.hidden = true;
      hiddenRepliesHost.className = 'comment-hidden-children';
      hiddenChildren.forEach((child) => {
        hiddenRepliesHost.appendChild(createGalleryCommentElement(child, commentGroups, itemId, depth + 1));
      });

      const collapseButton = document.createElement('button');
      collapseButton.type = 'button';
      collapseButton.className = 'reply-collapse-btn';
      collapseButton.textContent = `View ${hiddenChildren.length} more repl${hiddenChildren.length === 1 ? 'y' : 'ies'}`;
      collapseButton.addEventListener('click', () => {
        const isHidden = hiddenRepliesHost.hidden;
        hiddenRepliesHost.hidden = !isHidden;
        collapseButton.textContent = isHidden
          ? 'Hide extra replies'
          : `View ${hiddenChildren.length} more repl${hiddenChildren.length === 1 ? 'y' : 'ies'}`;
      });

      childrenHost.appendChild(collapseButton);
      childrenHost.appendChild(hiddenRepliesHost);
    }

    commentEl.appendChild(childrenHost);
  }

  return commentEl;
}

function renderGalleryComments(comments, itemId) {
  const commentsList = document.getElementById('commentsList');
  commentsList.innerHTML = '';

  if (comments.length === 0) {
    commentsList.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
    return;
  }

  const commentGroups = buildCommentGroups(comments);
  const rootComments = commentGroups.get(0) || [];

  rootComments.forEach((comment) => {
    commentsList.appendChild(createGalleryCommentElement(comment, commentGroups, itemId));
  });
}

async function handleGalleryLikeToggle(itemId) {
  const likeButton = document.getElementById('likeButton');
  if (!likeButton) return;

  const isLiked = likeButton.dataset.liked === 'true';
  likeButton.disabled = true;

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}/like`), {
      method: isLiked ? 'DELETE' : 'POST',
      credentials: 'include'
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || 'Failed to like item.');
    }

    setGalleryLikeButtonState(likeButton, Boolean(result.liked), typeof result.likes === 'number' ? result.likes : 0);
  } catch (error) {
    alert(error.message);
  }

  likeButton.disabled = false;
}

async function handleGallerySaveToggle(itemId) {
  const saveButton = document.getElementById('saveButton');
  if (!saveButton) return;

  const isSaved = saveButton.dataset.saved === 'true';
  saveButton.disabled = true;

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}/save`), {
      method: isSaved ? 'DELETE' : 'POST',
      credentials: 'include'
    });
    const result = await response.json().catch(() => ({}));

    if (!response.ok) {
      throw new Error(result.error || 'Failed to update saved item.');
    }

    setGallerySaveButtonState(saveButton, Boolean(result.saved));
  } catch (error) {
    alert(error.message);
    setGallerySaveButtonState(saveButton, isSaved);
  } finally {
    saveButton.disabled = false;
  }
}

async function handleGalleryCommentSubmit(event, itemId, parentCommentId = null) {
  event.preventDefault();
  const form = event.target;
  const textarea = form.querySelector('textarea');
  const content = textarea?.value || '';
  const submitButton = form.querySelector('button[type="submit"]');
  const isReply = parentCommentId !== null;
  const originalButtonText = submitButton.textContent;

  submitButton.disabled = true;
  submitButton.textContent = isReply ? 'Replying...' : 'Posting...';

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}/comments`), {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, parentCommentId }),
    });
    const newComment = await response.json();
    if (!response.ok) throw new Error(newComment.error || 'Failed to post comment.');

    await openGalleryModal(itemId);
  } catch (error) {
    alert(error.message);
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = originalButtonText;
  }
}

(async () => {
  currentUser = await loadAuthState();
  await loadGallery();
  const requestedItemId = new URLSearchParams(window.location.search).get('item');
  if (requestedItemId) {
    await openGalleryModal(requestedItemId);
  }
})();
</script>
<script src="navbar.js"></script>
