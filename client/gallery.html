<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | AIC Ziwani</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">

<script src="runtime-config.js"></script>
<script src="backend-origin.js"></script>
<script>
  (function() {
    const { protocol, hostname, port, pathname, search, hash } = window.location;
    const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

    if (protocol.startsWith("http") && isLocalHost && port && port !== "3000") {
      window.location.replace(`${protocol}//${hostname}:3000${pathname}${search}${hash}`);
    }
  })();
</script>

<script>
  (function() {
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
:root {
  --primary-red: #c8102e;
  --dark-red: #9e0d23;
  --bg-primary: #f4f4f4;
  --bg-secondary: white;
  --bg-secondary-translucent: rgba(255, 255, 255, 0.96);
  --text-primary: #222;
  --text-secondary: gray;
  --text-on-primary: white;
  --border-color: #ddd;
  --shadow-color-light: rgba(0,0,0,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.08);
  --shadow-color-hover: rgba(0,0,0,0.12);
  --button-bg: #f0f0f0;
  --button-border: #ddd;
  --button-hover-bg: #e0e0e0;
}


[data-theme="dark"] {
  --primary-red: #e53935;
  --dark-red: #c8102e;
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --bg-secondary-translucent: rgba(30, 30, 30, 0.96);
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border-color: #333;
  --shadow-color-light: rgba(255,255,255,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.2);
  --shadow-color-hover: rgba(0,0,0,0.3);
  --button-bg: #2a2a2a;
  --button-border: #444;
  --button-hover-bg: #3a3a3a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* NAVBAR */
nav {
  background: var(--bg-secondary-translucent);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px var(--shadow-color-light);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.logo-area img {
  width: 56px;
}

.church-name h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.church-name span {
  font-size: 12px;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  display: block;
}

.nav-links {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  margin-left: auto;
}

.nav-links a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  line-height: 1;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  color: var(--text-primary);
}

.nav-links a:hover {
  background: var(--primary-red);
  color: var(--text-on-primary);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

.nav-links a.active {
  background: var(--primary-red);
  color: var(--text-on-primary);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

@media (max-width: 900px) {
  nav {
    padding: 14px 20px;
  }

  .church-name h1 {
    font-size: 18px;
  }

  .nav-links {
    width: 100%;
    justify-content: center;
  }
}

/* HEADER */
.page-header {
  background:
    linear-gradient(180deg, rgba(200,16,46,0.06), rgba(200,16,46,0)),
    var(--bg-secondary);
  color: var(--text-primary);
  padding: 72px 20px 56px;
  text-align: center;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}

.page-header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(180px, 42vw);
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, #c8102e, #9e0d23);
}

.page-header h2 {
  font-size: 42px;
  color: var(--primary-red);
}

.page-header p {
  margin-top: 15px;
  font-size: 18px;
  color: var(--text-secondary);
}

/* GALLERY SECTION */
.gallery-section {
  padding: 100px 60px;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 12px 30px var(--shadow-color-heavy);
  cursor: pointer;
  transition: 0.3s ease;
}

.gallery-item img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  transition: 0.4s ease;
}

.gallery-item:hover img {
  transform: scale(1.1);
}

.gallery-title {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  color: white;
  width: 100%;
  padding: 10px;
  font-size: 14px;
  text-align: center;
}

/* MODAL STYLES */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal-content {
  background: var(--bg-secondary);
  border-radius: 18px;
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--button-border);
  border-radius: 999px;
  background: var(--bg-secondary-translucent);
  color: var(--text-primary);
  font-size: 28px;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 24px var(--shadow-color-light);
  transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
}

.modal-close:hover {
  background: var(--button-hover-bg);
  transform: translateY(-1px);
  box-shadow: 0 14px 28px var(--shadow-color-heavy);
}

#modalBody {
  padding: 30px;
  overflow-y: auto;
}

#modalBody .media-container {
  text-align: center;
  margin-bottom: 20px;
}

#modalBody img, #modalBody video {
  max-width: 100%;
  max-height: 60vh;
  border-radius: 12px;
}

#modalBody h3 {
  font-size: 24px;
  margin-bottom: 20px;
}

.post-actions {
  margin-top: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-top: 1px solid var(--border-color);
  padding-top: 20px;
}

#likeButton {
  background: var(--button-bg);
  border: 1px solid var(--button-border);
  padding: 10px 20px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s ease;
}

#likeButton:hover {
  background: var(--button-hover-bg);
}

#likeButton:disabled {
  cursor: not-allowed;
  opacity: 0.7;
}

#likeCount {
  font-weight: 600;
  color: var(--text-secondary);
}

.comments-section {
  margin-top: 30px;
  border-top: 1px solid var(--border-color);
  padding-top: 20px;
}

.comments-section h4 {
  margin-bottom: 20px;
}

#commentForm {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 30px;
}

#commentForm input,
#commentForm textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 16px;
  background: var(--bg-primary);
  color: var(--text-primary);
}

#commentForm textarea {
  min-height: 80px;
  resize: vertical;
}

#commentForm button {
  align-self: flex-start;
  background: var(--primary-red);
  color: var(--text-on-primary);
  border: none;
  padding: 12px 25px;
  border-radius: 999px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}

#commentForm button:hover {
  background: var(--dark-red);
}

.comment {
  background: var(--bg-primary);
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid var(--border-color);
}

.comment-author {
  font-weight: bold;
  margin-bottom: 5px;
}

.comment-date {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: 8px;
}

.comment-content {
  line-height: 1.6;
}

/* FOOTER */
footer {
  background: #1e1e1e;
  color: var(--text-on-primary);
  padding: 30px;
  text-align: center;
  margin-top: 80px;
}

@media (max-width: 640px) {
  nav {
    padding: 12px 14px;
    gap: 14px;
    align-items: flex-start;
  }

  .logo-area {
    width: 100%;
  }

  .logo-area img {
    width: 46px;
  }

  .church-name h1 {
    font-size: 17px;
  }

  .church-name span {
    font-size: 11px;
  }

  .nav-links {
    width: 100%;
    margin-left: 0;
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a {
    flex: 0 0 auto;
    white-space: nowrap;
    padding: 10px 14px;
  }

  .page-header {
    padding: 56px 16px;
  }

  .page-header h2 {
    font-size: 32px;
  }

  .page-header p {
    font-size: 16px;
  }

  .gallery-section {
    padding: 56px 16px;
  }

  .gallery-grid {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .gallery-item img {
    height: 220px;
  }

  .modal-overlay {
    padding: 12px;
  }

  .modal-content {
    max-height: calc(100vh - 24px);
    border-radius: 16px;
  }

  .modal-close {
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    font-size: 24px;
  }

  #modalBody {
    padding: 18px 16px 22px;
  }

  .post-actions {
    flex-direction: column;
    align-items: flex-start;
  }

  #likeButton,
  #commentForm button {
    width: 100%;
  }

  #commentForm button {
    align-self: stretch;
  }

  footer {
    margin-top: 48px;
    padding: 24px 16px;
  }

}
</style>

</head>

<body>

<nav>
  <div class="logo-area">
    <img src="favicon.png" alt="AIC Ziwani logo">
    <div class="church-name">
      <h1>AIC Ziwani CYA</h1>
      <span>Africa Inland Church</span>
    </div>
  </div>

  <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation menu">
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
    <span class="nav-toggle-bar"></span>
  </button>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="fellowship.html">Fellowship</a>
    <a href="events.html">Events</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="blog.html">Blog</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<section class="page-header">
  <h2>Gallery</h2>
  <p>Moments from worship, fellowship, and outreach.</p>
</section>

<section class="gallery-section">
  <div class="gallery-grid" id="galleryContainer"></div>
</section>

<div id="galleryModal" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" type="button" aria-label="Close gallery item" title="Close">&times;</button>
    <div id="modalBody">
      <!-- Dynamic content will be loaded here -->
    </div>
  </div>
</div>

<footer>
  © 2026 AIC Ziwani | Africa Inland Church. All Rights Reserved.
</footer>

<script>
const LOCAL_BACKEND_ORIGIN = "http://localhost:3000";

function getBackendOrigin() {
  if (window.CYABackendOrigin?.resolveBackendOrigin) {
    return window.CYABackendOrigin.resolveBackendOrigin({ localFallback: LOCAL_BACKEND_ORIGIN });
  }

  const { protocol, hostname, port, origin } = window.location;
  const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";
  if (protocol.startsWith("http") && (!isLocalHost || port === "3000")) {
    return origin;
  }

  return LOCAL_BACKEND_ORIGIN;
}

const backendOrigin = getBackendOrigin();

function buildBackendUrl(path) {
  if (window.CYABackendOrigin?.buildBackendUrl) {
    return window.CYABackendOrigin.buildBackendUrl(path, backendOrigin);
  }

  return new URL(path, backendOrigin).toString();
}

let currentUser = null;

async function loadAuthState() {
  try {
    const response = await fetch(buildBackendUrl("/api/auth/user"), {
      credentials: "include"
    });

    if (!response.ok) {
      return null;
    }

    const user = await response.json();
    return (user && user.displayName) ? user : null;
  } catch (error) {
    console.error("Could not load auth state:", error);
    return null;
  }
}

async function loadGallery() {
  try {
    const response = await fetch(buildBackendUrl("/api/gallery"));
    const images = await response.json();

    const container = document.getElementById("galleryContainer");
    container.innerHTML = "";

    images.forEach(item => {
      const fileUrl = buildBackendUrl(item.image_url);
      const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
      
      let mediaMarkup = "";
      if (isVideo) {
        mediaMarkup = `<video src="${fileUrl}" style="width: 100%; height: 280px; object-fit: cover; pointer-events: none;"></video>`;
      } else {
        mediaMarkup = `<img src="${fileUrl}" alt="${item.title}">`;
      }

      const card = `
        <div class="gallery-item" data-id="${item.id}">
          ${mediaMarkup}
          <div class="gallery-title">${item.title}</div>
        </div>
      `;
      container.innerHTML += card;
    });

    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => openGalleryModal(item.dataset.id));
    });

  } catch (error) {
    console.error("Error loading gallery:", error);
  }
}

const modal = document.getElementById('galleryModal');
const modalBody = document.getElementById('modalBody');
const modalClose = document.querySelector('.modal-close');

modalClose.addEventListener('click', closeGalleryModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) {
    closeGalleryModal();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('open')) {
    closeGalleryModal();
  }
});

function closeGalleryModal() {
  modal.classList.remove('open');
  modalBody.innerHTML = '';
}

async function openGalleryModal(itemId) {
  modalBody.innerHTML = '<h3>Loading...</h3>';
  modal.classList.add('open');

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}`), {
      credentials: 'include'
    });
    if (!response.ok) throw new Error('Failed to load gallery item.');
    const item = await response.json();

    const fileUrl = buildBackendUrl(item.image_url);
    const isVideo = item.image_url.match(/\.(mp4|webm|ogg|mov)$/i);
    const mediaMarkup = isVideo
      ? `<video src="${fileUrl}" controls></video>`
      : `<img src="${fileUrl}" alt="${item.title}">`;

    modalBody.innerHTML = `
      <div class="media-container">${mediaMarkup}</div>
      <h3>${item.title}</h3>
      <div class="post-actions">
        <button id="likeButton" title="Like this item">❤️ Like</button>
        <span id="likeCount">${item.likes} likes</span>
      </div>
      <div class="comments-section">
        <h4><span id="commentCount">${item.comments.length}</span> Comments</h4>
        <form id="commentForm">
          <input type="text" id="authorName" placeholder="Your Name" required>
          <textarea id="commentContent" placeholder="Write a comment..." required></textarea>
          <button type="submit">Post Comment</button>
        </form>
        <div id="commentsList"></div>
      </div>
    `;

    renderGalleryComments(item.comments);

    const likeButton = document.getElementById('likeButton');
    const commentForm = document.getElementById('commentForm');
    const authorNameInput = document.getElementById('authorName');

    if (!currentUser) {
      likeButton.disabled = true;
      likeButton.textContent = 'Login to like';

      if (commentForm) {
        const loginPrompt = document.createElement('p');
        loginPrompt.textContent = 'Please log in from the home page to like this item or leave a comment.';
        commentForm.replaceWith(loginPrompt);
      }
    } else {
      if (authorNameInput) {
        authorNameInput.value = currentUser.displayName || '';
        authorNameInput.readOnly = true;
      }

      if (item.userHasLiked) {
        likeButton.disabled = true;
        likeButton.textContent = 'Liked!';
      } else {
        likeButton.addEventListener('click', () => handleGalleryLike(item.id));
      }

      if (commentForm) {
        commentForm.addEventListener('submit', (e) => handleGalleryCommentSubmit(e, item.id));
      }
    }

  } catch (error) {
    modalBody.innerHTML = `<p style="color: red;">${error.message}</p>`;
  }
}

function renderGalleryComments(comments) {
  const commentsList = document.getElementById('commentsList');
  commentsList.innerHTML = '';

  if (comments.length === 0) {
    commentsList.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
    return;
  }

  comments.forEach(comment => {
    const commentDate = new Date(comment.created_at).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const commentEl = document.createElement('div');
    commentEl.className = 'comment';
    commentEl.innerHTML = `
      <p class="comment-author">
        ${comment.author_name}
        <span class="comment-date">${commentDate}</span>
      </p>
      <p class="comment-content">${comment.content}</p>
    `;
    commentsList.appendChild(commentEl);
  });
}

async function handleGalleryLike(itemId) {
  const likeButton = document.getElementById('likeButton');
  const likeCountSpan = document.getElementById('likeCount');
  likeButton.disabled = true;

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}/like`), {
      method: 'POST',
      credentials: 'include'
    });
    const result = await response.json();
    if (!response.ok) {
      if (response.status === 409) {
        likeButton.textContent = 'Liked!';
        if (typeof result.likes === 'number') {
          likeCountSpan.textContent = `${result.likes} likes`;
        }
        return;
      }
      throw new Error(result.error || 'Failed to like item.');
    }

    likeCountSpan.textContent = `${result.likes} likes`;
    likeButton.textContent = 'Liked!';
  } catch (error) {
    alert(error.message);
    likeButton.disabled = false;
  }
}

async function handleGalleryCommentSubmit(event, itemId) {
  event.preventDefault();
  const form = event.target;
  const content = form.querySelector('#commentContent').value;
  const submitButton = form.querySelector('button');

  submitButton.disabled = true;
  submitButton.textContent = 'Posting...';

  try {
    const response = await fetch(buildBackendUrl(`/api/gallery/${itemId}/comments`), {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    const newComment = await response.json();
    if (!response.ok) throw new Error(newComment.error || 'Failed to post comment.');

    // Refresh the comments list and count
    const commentsList = document.getElementById('commentsList');
    if (commentsList.querySelector('p')?.textContent.startsWith('No comments yet')) {
      commentsList.innerHTML = '';
    }
    const commentCountSpan = document.getElementById('commentCount');
    commentCountSpan.textContent = parseInt(commentCountSpan.textContent, 10) + 1;
    
    const commentDate = new Date(newComment.created_at).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const commentEl = document.createElement('div');
    commentEl.className = 'comment';
    commentEl.innerHTML = `<p class="comment-author">${newComment.author_name}<span class="comment-date">${commentDate}</span></p><p class="comment-content">${newComment.content}</p>`;
    commentsList.prepend(commentEl);

    form.reset();
  } catch (error) {
    alert(error.message);
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = 'Post Comment';
  }
}

(async () => {
  currentUser = await loadAuthState();
  await loadGallery();
})();
</script>
