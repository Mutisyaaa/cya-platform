<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | AIC Ziwani</title>

<script>
  (function() {
    const theme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
:root {
  --primary-red: #c8102e;
  --dark-red: #9e0d23;
  --bg-primary: #f4f4f4;
  --bg-secondary: white;
  --bg-secondary-translucent: rgba(255, 255, 255, 0.96);
  --text-primary: #222;
  --text-secondary: gray;
  --text-on-primary: white;
  --border-color: #eee;
  --shadow-color-light: rgba(0,0,0,0.05);
  --shadow-color-heavy: rgba(0,0,0,0.06);
  --shadow-color-hover: rgba(0,0,0,0.1);
  --button-hover-bg: #f0f0f0; /* For calendar event indicator */
}

[data-theme="dark"] {
  --primary-red: #e53935;
  --dark-red: #c8102e;
  --bg-primary: #121212;
  --bg-secondary: #1e1e1e;
  --bg-secondary-translucent: rgba(30, 30, 30, 0.96);
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --border-color: #333;
  --shadow-color-light: rgba(255,255,255,0.05);
  --shadow-color-heavy: rgba(255,255,255,0.1);
  --shadow-color-hover: rgba(255,255,255,0.15);
  --button-hover-bg: #2a2a2a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* NAVBAR */
nav {
  background: var(--bg-secondary-translucent);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px var(--shadow-color-light);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}

.logo-area img {
  width: 56px;
}

.church-name h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.church-name span {
  font-size: 12px;
  color: var(--text-primary);
  letter-spacing: 0.08em;
  display: block;
}

.nav-links {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  margin-left: auto;
}

.nav-links a {
  text-decoration: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  line-height: 1;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  color: var(--text-primary);
}

.nav-links a:hover {
  background: var(--primary-red);
  color: var(--text-on-primary);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

.nav-links a.active {
  background: var(--primary-red);
  color: var(--text-on-primary);
  box-shadow: 0 10px 24px rgba(200,16,46,0.18);
}

@media (max-width: 900px) {
  nav {
    padding: 14px 20px;
  }

  .church-name h1 {
    font-size: 18px;
  }

  .nav-links {
    width: 100%;
    justify-content: center;
  }
}

/* HEADER */
.page-header {
  background: linear-gradient(135deg, #c8102e, #9e0d23);
  color: var(--text-on-primary);
  padding: 80px 20px;
  text-align: center;
}

.page-header h2 {
  font-size: 42px;
}

.page-header p {
  margin-top: 15px;
  font-size: 18px;
}

/* EVENTS SECTION */
.events-section {
  padding: 100px 60px;
}

.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 35px;
}

.event-card {
  background: var(--bg-secondary);
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 12px 30px var(--shadow-color-heavy);
  transition: 0.3s ease;
  position: relative;
}

.event-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 18px 40px var(--shadow-color-hover);
}

.event-date {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 15px;
}

.event-card p {
  margin-bottom: 20px;
  line-height: 1.6;
}

.upcoming-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--primary-red);
  color: var(--text-on-primary);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.event-countdown {
  font-weight: bold;
  margin-top: 15px;
  color: var(--dark-red);
}

.event-actions {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 15px;
}

.rsvp-info {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
}

.rsvp-btn {
  background: var(--primary-red);
  color: var(--text-on-primary);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.rsvp-btn.going {
  background: #4caf50; /* A green color to indicate success */
}

.rsvp-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  background: var(--text-secondary);
}

/* CALENDAR */
.section-title {
  font-size: 28px;
  margin-bottom: 30px;
  text-align: center;
}

.calendar-container {
  max-width: 1000px;
  margin: 0 auto 60px auto;
  background: var(--bg-secondary);
  border-radius: 18px;
  box-shadow: 0 12px 30px var(--shadow-color-heavy);
  overflow: hidden;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background: var(--primary-red);
  color: var(--text-on-primary);
}

.calendar-header button {
  background: rgba(255,255,255,0.2);
  border: none;
  color: var(--text-on-primary);
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  padding: 8px 15px;
  border-radius: 8px;
  transition: 0.3s;
}

.calendar-header button:hover {
  background: rgba(255,255,255,0.4);
}

.calendar-header h3 {
  margin: 0;
  font-size: 20px;
}

.calendar-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--bg-primary);
  text-align: center;
  font-weight: 600;
  padding: 15px 0;
  border-bottom: 1px solid var(--border-color);
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

.calendar-cell {
  min-height: 120px;
  padding: 10px;
  border-right: 1px solid var(--border-color);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.calendar-cell:nth-child(7n) {
  border-right: none;
}

.calendar-cell.empty {
  background: var(--bg-primary); /* Or a slightly different shade if desired */
}

.calendar-cell .date {
  font-weight: bold;
  color: var(--text-primary);
  font-size: 14px;
}

.calendar-cell .event-indicator {
  background: var(--button-hover-bg); /* Using a button hover bg for a subtle indicator */
  color: var(--dark-red);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 6px;
  border-radius: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 3px solid var(--primary-red);
}

/* FOOTER */
footer {
  background: #1e1e1e;
  color: var(--text-on-primary);
  padding: 30px;
  text-align: center;
  margin-top: 80px;
}

@media (max-width: 640px) {
  nav {
    padding: 12px 14px;
    gap: 14px;
    align-items: flex-start;
  }

  .logo-area {
    width: 100%;
  }

  .logo-area img {
    width: 46px;
  }

  .church-name h1 {
    font-size: 17px;
  }

  .church-name span {
    font-size: 11px;
  }

  .nav-links {
    width: 100%;
    margin-left: 0;
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .nav-links::-webkit-scrollbar {
    display: none;
  }

  .nav-links a {
    flex: 0 0 auto;
    white-space: nowrap;
    padding: 10px 14px;
  }

  .page-header {
    padding: 56px 16px;
  }

  .page-header h2 {
    font-size: 32px;
  }

  .page-header p {
    font-size: 16px;
  }

  .events-section {
    padding: 56px 16px;
  }

  .section-title {
    font-size: 24px;
    margin-bottom: 22px;
  }

  .events-grid {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .event-card {
    padding: 24px 18px;
  }

  .event-actions {
    flex-direction: column;
    align-items: flex-start;
  }

  .rsvp-btn {
    width: 100%;
  }

  .calendar-container {
    overflow: hidden;
    border-radius: 16px;
  }

  .calendar-header {
    padding: 12px 10px;
    gap: 8px;
  }

  .calendar-header button {
    padding: 6px 10px;
    font-size: 12px;
  }

  .calendar-header h3 {
    font-size: 16px;
    text-align: center;
  }

  .calendar-days {
    padding: 8px 0;
    font-size: 10px;
    letter-spacing: -0.02em;
  }

  .calendar-cell {
    min-height: 58px;
    padding: 4px 3px;
    gap: 3px;
  }

  .calendar-cell .date {
    font-size: 11px;
  }

  .calendar-cell .event-indicator {
    width: 8px;
    height: 8px;
    padding: 0;
    border-radius: 999px;
    border-left: none;
    font-size: 0;
    line-height: 0;
    text-indent: -9999px;
    overflow: hidden;
    background: var(--primary-red);
    box-shadow: 0 0 0 1px rgba(200,16,46,0.14);
  }

  footer {
    margin-top: 48px;
    padding: 24px 16px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo-area">
    <img src="logo.png" alt="AIC Logo">
    <div class="church-name">
      <h1>AIC Ziwani CYA</h1>
      <span>Africa Inland Church</span>
    </div>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="fellowship.html">Fellowship</a>
    <a href="events.html" class="active">Events</a>
    <a href="gallery.html">Gallery</a>
    <a href="blog.html">Blog</a>
    <a href="index.html#contact">Contact</a>
  </div>
</nav>

<section class="page-header">
  <h2>Upcoming Events</h2>
  <p>Stay updated with what’s happening at AIC Ziwani.</p>
</section>

<section class="events-section">
  <h2 class="section-title">Events Calendar</h2>
  <div class="calendar-container">
    <div class="calendar-header">
      <button id="prevMonth">&lt; Prev</button>
      <h3 id="monthYear"></h3>
      <button id="nextMonth">Next &gt;</button>
    </div>
    <div class="calendar-days">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <h2 class="section-title" style="margin-top: 60px;">Event Details</h2>
  <div class="events-grid" id="eventsContainer"></div>
</section>

<footer>
  © 2026 AIC Ziwani | Africa Inland Church. All Rights Reserved.
</footer>

<script>
  let allEvents = [];
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let countdownIntervals = [];
  let currentUser = null;

  const LOCAL_BACKEND_ORIGIN = "http://localhost:3000";

  function getBackendOrigin() {
    const { protocol, hostname, port, origin } = window.location;
    const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

    if (protocol.startsWith("http") && (!isLocalHost || port === "3000")) {
      return origin;
    }

    return LOCAL_BACKEND_ORIGIN;
  }

  const backendOrigin = getBackendOrigin();

  function buildBackendUrl(path) {
    return new URL(path, backendOrigin).toString();
  }

  async function loadAuthState() {
    try {
      const response = await fetch(buildBackendUrl("/api/auth/user"), {
        credentials: "include"
      });
      if (!response.ok) return null;
      const user = await response.json();
      return (user && user.displayName) ? user : null;
    } catch (error) {
      console.error("Could not load auth state:", error);
      return null;
    }
  }

  async function loadEvents() {
    try {
      const response = await fetch(buildBackendUrl("/api/events"), { credentials: 'include' });
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      allEvents = await response.json();
      
      renderCalendar();
      renderEventsList();
      startCountdowns();

    } catch (error) {
      console.error("Error loading events:", error);
      document.getElementById("eventsContainer").innerHTML = `<p style="color: red; text-align: center; grid-column: 1 / -1;">Failed to load events. Please try again later.</p>`;
    }
  }

  function getLocalDateFromISO(isoDateString) {
    if (!isoDateString) return new Date();
    const parts = isoDateString.split('T')[0].split('-');
    return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  }

  function renderEventsList() {
    const container = document.getElementById("eventsContainer");
    container.innerHTML = "";

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const monthlyEvents = allEvents.filter(event => {
      const eventDate = getLocalDateFromISO(event.event_date);
      return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
    });

    if (monthlyEvents.length === 0) {
      container.innerHTML = "<p style='grid-column: 1 / -1; text-align: center;'>No events scheduled for this month.</p>";
      return;
    }

    monthlyEvents.forEach(event => {
      const eventDate = getLocalDateFromISO(event.event_date);
      const isUpcoming = eventDate >= today;

      let rsvpButton = '';
      if (isUpcoming) {
        if (currentUser) {
          if (event.user_rsvpd) {
            rsvpButton = `<button class="rsvp-btn going" data-event-id="${event.id}">✓ Going</button>`;
          } else {
            rsvpButton = `<button class="rsvp-btn" data-event-id="${event.id}">RSVP</button>`;
          }
        } else {
          rsvpButton = `<button class="rsvp-btn" disabled title="You must be logged in to RSVP">RSVP</button>`;
        }
      }

      const card = `
        <div class="event-card">
          ${isUpcoming ? '<div class="upcoming-badge">Upcoming</div>' : ''}
          <h3>${event.title}</h3>
          <div class="event-date">
            ${eventDate.toDateString()} | ${event.event_time ? event.event_time.substring(0, 5) : 'All Day'}
          </div>
          <p>${event.description ? event.description : ''}</p>
          <div class="event-countdown" data-event-date="${event.event_date}" data-event-time="${event.event_time || ''}"></div>
          <div class="event-actions">
            <div class="rsvp-info">${event.rsvp_count || 0} going</div>
            ${rsvpButton}
          </div>
        </div>
      `;

      container.innerHTML += card;
    });
  }

  function renderCalendar() {
    const calendarGrid = document.getElementById("calendarGrid");
    const monthYear = document.getElementById("monthYear");
    calendarGrid.innerHTML = "";

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    monthYear.innerText = `${monthNames[currentMonth]} ${currentYear}`;

    for (let i = 0; i < firstDay; i++) {
      calendarGrid.innerHTML += `<div class="calendar-cell empty"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dayEvents = allEvents.filter(e => {
        if (!e.event_date) return false;
        const eDate = getLocalDateFromISO(e.event_date);
        return eDate.getFullYear() === currentYear && eDate.getMonth() === currentMonth && eDate.getDate() === day;
      });

      let eventsHtml = dayEvents.map(e => `<div class="event-indicator" title="${e.title}">${e.title}</div>`).join('');

      calendarGrid.innerHTML += `
        <div class="calendar-cell">
          <div class="date">${day}</div>
          ${eventsHtml}
        </div>
      `;
    }
  }

  function startCountdowns() {
    countdownIntervals.forEach(clearInterval);
    countdownIntervals = [];

    const countdownElements = document.querySelectorAll('.event-countdown');

    countdownElements.forEach(element => {
      const { eventDate, eventTime } = element.dataset;
      if (!eventDate) return;

      const dateOnly = eventDate.split('T')[0];
      const targetDate = new Date(`${dateOnly}T${eventTime || '00:00:00'}`);

      let intervalId;
      const updateCountdown = () => {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
          if (intervalId) clearInterval(intervalId);
          const endOfDay = new Date(targetDate);
          endOfDay.setHours(23, 59, 59, 999);
          element.innerHTML = new Date().getTime() > endOfDay.getTime() ? "This event has passed." : (eventTime ? "This event has passed." : "This event is today.");
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        let countdownText = "";
        if (days > 0) countdownText += `${days}d `;
        if (hours > 0 || days > 0) countdownText += `${hours}h `;
        if (minutes > 0 || hours > 0 || days > 0) countdownText += `${minutes}m `;
        countdownText += `${seconds}s`;

        element.innerHTML = `Time Left: ${countdownText}`;
      };

      updateCountdown();
      intervalId = setInterval(updateCountdown, 1000);
      countdownIntervals.push(intervalId);
    });
  }

  window.addEventListener('beforeunload', () => {
    countdownIntervals.forEach(clearInterval);
  });

  document.getElementById("prevMonth").addEventListener("click", () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
    renderEventsList();
  });

  document.getElementById("nextMonth").addEventListener("click", () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
    renderEventsList();
  });

  document.getElementById('eventsContainer').addEventListener('click', async (e) => {
    if (e.target.matches('.rsvp-btn')) {
      if (!currentUser) {
        alert("Please log in to RSVP for events.");
        return;
      }

      const button = e.target;
      const eventId = button.dataset.eventId;
      const isRsvpd = button.classList.contains('going');

      button.disabled = true;

      try {
        const method = isRsvpd ? 'DELETE' : 'POST';
        const response = await fetch(buildBackendUrl(`/api/events/${eventId}/rsvp`), {
          method: method,
          credentials: 'include'
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Something went wrong.');
        }

        const rsvpInfo = button.parentElement.querySelector('.rsvp-info');
        let currentCount = parseInt(rsvpInfo.textContent);

        if (isRsvpd) {
          button.classList.remove('going');
          button.textContent = 'RSVP';
          rsvpInfo.textContent = `${currentCount - 1} going`;
        } else {
          button.classList.add('going');
          button.textContent = '✓ Going';
          rsvpInfo.textContent = `${currentCount + 1} going`;
        }
      } catch (error) {
        alert(`Error: ${error.message}`);
      } finally {
        button.disabled = false;
      }
    }
  });

  async function initializePage() {
    currentUser = await loadAuthState();
    await loadEvents();
  }

  initializePage();
</script>

</body>
</html>
