<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events | AIC Ziwani</title>

<style>
:root {
  --primary-red: #c8102e;
  --dark-red: #9e0d23;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f4f4;
  color: #222;
}

/* NAVBAR */
nav {
  background: white;
  padding: 18px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo-area img {
  width: 60px;
}

.church-name h1 {
  font-size: 20px;
  font-weight: 700;
  color: black;
}

.church-name span {
  font-size: 13px;
  color: black;
}

.nav-links {
  display: flex;
  gap: 15px;
}

.nav-links a {
  text-decoration: none;
  padding: 8px 18px;
  border-radius: 25px;
  font-weight: 600;
  transition: 0.3s ease;
  color: black;
}

.nav-links a:hover {
  background: var(--primary-red);
  color: white;
  transform: translateY(-3px);
}

.nav-links a.active {
  background: var(--primary-red);
  color: white;
}

/* HEADER */
.page-header {
  background: linear-gradient(135deg, #c8102e, #9e0d23);
  color: white;
  padding: 80px 20px;
  text-align: center;
}

.page-header h2 {
  font-size: 42px;
}

.page-header p {
  margin-top: 15px;
  font-size: 18px;
}

/* EVENTS SECTION */
.events-section {
  padding: 100px 60px;
}

.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 35px;
}

.event-card {
  background: white;
  padding: 35px;
  border-radius: 18px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
  transition: 0.3s ease;
  position: relative;
}

.event-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 18px 40px rgba(0,0,0,0.1);
}

.event-date {
  font-size: 14px;
  color: gray;
  margin-bottom: 15px;
}

.event-card p {
  margin-bottom: 20px;
  line-height: 1.6;
}

.upcoming-badge {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--primary-red);
  color: white;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  padding: 30px;
  text-align: center;
  margin-top: 80px;
}
</style>
</head>

<body>

<nav>
  <div class="logo-area">
    <img src="logo.png" alt="AIC Logo">
    <div class="church-name">
      <h1>AIC Ziwani</h1>
      <span>Africa Inland Church</span>
    </div>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="services.html">Services</a>
    <a href="events.html" class="active">Events</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<section class="page-header">
  <h2>Upcoming Events</h2>
  <p>Stay updated with what’s happening at AIC Ziwani.</p>
</section>

<section class="events-section">
  <div class="events-grid" id="eventsContainer"></div>
</section>

<footer>
  © 2026 AIC Ziwani | Africa Inland Church. All Rights Reserved.
</footer>

<script>
async function loadEvents() {
  try {
    const response = await fetch("/api/events");
    const events = await response.json();
    const container = document.getElementById("eventsContainer");
    container.innerHTML = "";

    const today = new Date();

    events.forEach(event => {
      const eventDate = new Date(event.event_date);
      const isUpcoming = eventDate >= today;

      const card = `
        <div class="event-card">
          ${isUpcoming ? '<div class="upcoming-badge">Upcoming</div>' : ''}
          <h3>${event.title}</h3>
          <div class="event-date">
            ${eventDate.toDateString()} | ${event.event_time}
          </div>
          <p>${event.description}</p>
        </div>
      `;

      container.innerHTML += card;
    });

  } catch (error) {
    console.error("Error loading events:", error);
  }
}

loadEvents();
</script>

</body>
</html>
