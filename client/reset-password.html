<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AIC Ziwani</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(178, 34, 34, 0.12), transparent 40%),
        linear-gradient(180deg, #fff8f6 0%, #ffffff 100%);
    }

    .reset-card {
      width: min(100%, 440px);
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(178, 34, 34, 0.12);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(32, 20, 20, 0.12);
    }

    .reset-card h1 {
      margin: 0 0 12px;
      font-size: 30px;
      color: var(--text-primary);
      text-align: center;
    }

    .reset-copy {
      margin: 0 0 22px;
      text-align: center;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .reset-form {
      display: grid;
      gap: 14px;
    }

    .reset-form input,
    .reset-form button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      font: inherit;
      box-sizing: border-box;
    }

    .reset-form input {
      border: 1px solid var(--border-color, #ddd);
      background: #fff;
      color: var(--text-primary);
    }

    .reset-form button {
      border: none;
      background: var(--primary-red, #b22222);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .reset-message {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .reset-message.error {
      background: rgba(178, 34, 34, 0.12);
      color: #8f1717;
    }

    .reset-message.success {
      background: rgba(11, 122, 66, 0.12);
      color: #0b7a42;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: var(--primary-red, #b22222);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="reset-card">
    <h1>Choose A New Password</h1>
    <p class="reset-copy">
      Set a new password for your account. Your reset link is valid for 1 hour.
    </p>

    <div id="resetError" class="reset-message error"></div>
    <div id="resetSuccess" class="reset-message success"></div>

    <form id="resetForm" class="reset-form">
      <input type="password" id="newPassword" name="password" placeholder="New password" minlength="8" required>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" minlength="8" required>
      <button type="submit" id="resetSubmitBtn">Reset Password</button>
    </form>

    <a class="back-link" href="/index.html">Back to home</a>
  </main>

  <script>
    const LOCAL_BACKEND_ORIGIN = "http://localhost:3000";
    const resetForm = document.getElementById("resetForm");
    const resetError = document.getElementById("resetError");
    const resetSuccess = document.getElementById("resetSuccess");
    const resetSubmitBtn = document.getElementById("resetSubmitBtn");

    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);

    function getBackendOrigin() {
      const { protocol, hostname, port, origin } = window.location;
      const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

      if (protocol.startsWith("http") && (!isLocalHost || port === "3000")) {
        return origin;
      }

      return LOCAL_BACKEND_ORIGIN;
    }

    function buildBackendUrl(path) {
      return new URL(path, getBackendOrigin()).toString();
    }

    function setMessage(element, message) {
      resetError.style.display = "none";
      resetSuccess.style.display = "none";

      if (!message) {
        return;
      }

      element.textContent = message;
      element.style.display = "block";
    }

    async function validateToken(token) {
      try {
        const validateUrl = new URL(buildBackendUrl("/api/auth/reset-password/validate"));
        validateUrl.searchParams.set("token", token);

        const response = await fetch(validateUrl.toString(), { credentials: "include" });
        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(result.error || "This password reset link is invalid or has expired.");
        }
      } catch (error) {
        setMessage(resetError, error.message || "This password reset link is invalid or has expired.");
        resetForm.querySelectorAll("input, button").forEach((element) => {
          element.disabled = true;
        });
      }
    }

    const token = new URLSearchParams(window.location.search).get("token") || "";

    if (!token) {
      setMessage(resetError, "This password reset link is missing or invalid.");
      resetForm.querySelectorAll("input, button").forEach((element) => {
        element.disabled = true;
      });
    } else {
      validateToken(token);
    }

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage(null, "");

      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (newPassword.length < 8) {
        setMessage(resetError, "Password must be at least 8 characters long.");
        return;
      }

      if (newPassword !== confirmPassword) {
        setMessage(resetError, "Passwords do not match.");
        return;
      }

      resetSubmitBtn.disabled = true;
      resetSubmitBtn.textContent = "Saving...";

      try {
        const response = await fetch(buildBackendUrl("/api/auth/reset-password"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ token, password: newPassword }),
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(result.error || "Could not reset password right now.");
        }

        resetForm.style.display = "none";
        setMessage(resetSuccess, result.message || "Your password has been reset successfully.");
      } catch (error) {
        setMessage(resetError, error.message || "Could not reset password right now.");
      } finally {
        resetSubmitBtn.disabled = false;
        resetSubmitBtn.textContent = "Reset Password";
      }
    });
  </script>
</body>
</html>
